<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post a bulletin update</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F3A5F; --paper:#F7F4EC; --card:#FFFFFF; --seal:#B33A3A; --seal-dark:#8F2E2E;
    --charcoal:#262523; --slate:#63707A; --line:#D8D2C4;
    --serif:'Fraunces', Georgia, serif; --sans:'IBM Plex Sans', sans-serif; --mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--charcoal); font-family:var(--sans); padding:40px 20px;}
  .wrap{max-width:560px; margin:0 auto;}
  h1{font-family:var(--serif); color:var(--ink); font-size:1.7rem; margin-bottom:6px;}
  p.sub{color:var(--slate); margin-top:0; margin-bottom:28px; font-size:.95rem;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:28px;}
  .field{margin-bottom:18px;}
  label{display:block; font-family:var(--mono); font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--slate); margin-bottom:7px;}
  input[type=text], input[type=password], textarea{
    width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:5px; font-family:var(--sans);
    font-size:.95rem; background:var(--paper); color:var(--charcoal);
  }
  textarea{min-height:100px; resize:vertical;}
  .upload{border:1.5px dashed var(--line); border-radius:6px; padding:18px; text-align:center; cursor:pointer; background:var(--paper);}
  .upload input{display:none;}
  .fname{font-size:.82rem; color:var(--ink); margin-top:6px; font-family:var(--mono);}
  .btn{width:100%; padding:14px; border-radius:5px; border:none; background:var(--seal); color:#fff; font-weight:600; font-size:1rem; cursor:pointer;}
  .btn:hover{background:var(--seal-dark);}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .msg{margin-top:16px; font-size:.9rem;}
  .msg.ok{color:#2E7D4F;}
  .msg.err{color:var(--seal-dark);}
  a.back{display:inline-block; margin-bottom:20px; color:var(--slate); text-decoration:none; font-size:.9rem;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; Back to site</a>
  <h1>Post a bulletin update</h1>
  <p class="sub">Anyone on staff can post here — no coding needed. Fill in the form and tap Post update.</p>
  <div class="card">
    <div class="field">
      <label for="pw">Staff password</label>
      <input type="password" id="pw" placeholder="Enter password">
    </div>
    <div class="field">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="e.g. New batch departs for Aichi Prefecture">
    </div>
    <div class="field">
      <label for="text">Details</label>
      <textarea id="text" placeholder="Write the update here…"></textarea>
    </div>
    <div class="field">
      <label>Photo or video (optional)</label>
      <label class="upload" for="mediaFile">
        <div>Tap to choose a photo or video</div>
        <div class="fname" id="fname">No file selected</div>
      </label>
      <input type="file" id="mediaFile" accept="image/*,video/*">
    </div>
    <button class="btn" id="postBtn">Post update</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
// Same Web App URL used by index.html's applicant form.
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyYO7T6NT2qsrlUEI8umPPBa4lz5JcYYfYUcKFXsBehMMBfSZzXogMAfqH5Sh-I-UZ8/exec";

document.getElementById('mediaFile').addEventListener('change', e=>{
  const f = e.target.files[0];
  document.getElementById('fname').textContent = f ? f.name : 'No file selected';
});

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById('postBtn').addEventListener('click', async ()=>{
  const pw = document.getElementById('pw').value;
  const title = document.getElementById('title').value.trim();
  const text = document.getElementById('text').value.trim();
  const file = document.getElementById('mediaFile').files[0];
  const msg = document.getElementById('msg');
  const btn = document.getElementById('postBtn');

  if(!pw || !title || !text){
    msg.className = 'msg err'; msg.textContent = 'Please fill in the password, title, and details.';
    return;
  }
  if(WEBAPP_URL.startsWith("PASTE_")){
    msg.className = 'msg err'; msg.textContent = 'This page isn\'t connected yet — add your Apps Script Web App URL in this file.';
    return;
  }

  btn.disabled = true;
  msg.className = 'msg'; msg.textContent = 'Posting…';

  try{
    const payload = { action:'postBulletin', password: pw, title, text, media: null };
    if(file){
      payload.media = {
        name: file.name,
        mimeType: file.type || 'application/octet-stream',
        data: await fileToBase64(file),
        kind: file.type.startsWith('video') ? 'video' : 'image'
      };
    }
    const res = await fetch(WEBAPP_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if(result.status === 'ok'){
      msg.className = 'msg ok'; msg.textContent = 'Posted! It will appear on the site right away.';
      document.getElementById('title').value = '';
      document.getElementById('text').value = '';
      document.getElementById('mediaFile').value = '';
      document.getElementById('fname').textContent = 'No file selected';
    } else {
      throw new Error(result.message || 'Unknown error');
    }
  }catch(err){
    msg.className = 'msg err'; msg.textContent = 'Could not post: ' + err.message;
  }finally{
    btn.disabled = false;
  }
});
</script>
</body>
</html>
